<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Subscription Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #eef2f7;
    font-family: 'Segoe UI';
}
.dark-mode {
    background: #121212;
    color: white;
}
.card-box {
    padding: 20px;
    border-radius: 12px;
    color: white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
.bg1 { background: linear-gradient(45deg,#007bff,#00c6ff); }
.bg2 { background: linear-gradient(45deg,#28a745,#5ee7df); }
.bg3 { background: linear-gradient(45deg,#ffc107,#ffdd00); color:black; }
.bg4 { background: linear-gradient(45deg,#dc3545,#ff6a6a); }

.table {
    background: white;
    border-radius: 10px;
    overflow: hidden;
}
.calendar {
    display: grid;
    grid-template-columns: repeat(7,1fr);
    gap: 5px;
}
.day {
    padding: 10px;
    background: white;
    border-radius: 8px;
    text-align: center;
    font-size: 12px;
}
.highlight {
    background: #ffc107;
}
</style>
</head>

<body>

<div class="container mt-4">

<!-- Header -->
<div class="d-flex justify-content-between mb-3">
    <h2>📊 Smart Dashboard</h2>
    <div>
        <button class="btn btn-dark" onclick="toggleDark()">🌙</button>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modal">+ Add</button>
    </div>
</div>

<!-- Cards -->
<div class="row mb-4">
    <div class="col-md-2"><div class="card-box bg1">Subs: <span id="total"></span></div></div>
    <div class="col-md-2"><div class="card-box bg2">Monthly ₹: <span id="monthly"></span></div></div>
    <div class="col-md-2"><div class="card-box bg3">Upcoming: <span id="upcoming"></span></div></div>
    <div class="col-md-2"><div class="card-box bg4">Expired: <span id="expired"></span></div></div>
    <div class="col-md-2"><div class="card-box bg1">Yearly ₹: <span id="yearly"></span></div></div>
</div>

<!-- Alerts -->
<div id="alerts"></div>

<!-- Search + Filter -->
<div class="row mb-2">
    <div class="col-md-6">
        <input type="text" id="search" class="form-control" placeholder="Search..." onkeyup="render()">
    </div>
    <div class="col-md-3">
        <select id="filter" class="form-control" onchange="render()">
            <option value="all">All</option>
            <option value="active">Active</option>
            <option value="expired">Expired</option>
            <option value="monthly">Monthly</option>
            <option value="yearly">Yearly</option>
        </select>
    </div>
</div>

<!-- Table -->
<table class="table table-bordered">
<thead>
<tr>
<th>Name</th><th>Cost</th><th>Cycle</th><th>Date</th><th>Status</th><th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<!-- Calendar -->
<h4>📅 Bill Calendar</h4>
<div id="calendar" class="calendar mb-4"></div>

</div>

<!-- Modal -->
<div class="modal fade" id="modal">
<div class="modal-dialog">
<div class="modal-content p-3">

<h4 id="title">Add Subscription</h4>

<input id="name" class="form-control mb-2" placeholder="Name">
<input id="price" type="number" class="form-control mb-2" placeholder="Price">

<select id="cycle" class="form-control mb-2">
<option>Monthly</option>
<option>Yearly</option>
</select>

<input type="date" id="date" class="form-control mb-2">

<button class="btn btn-success" onclick="saveData()">Save</button>

</div>
</div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("subs")) || [];
let editIndex = -1;

function saveLocal(){
    localStorage.setItem("subs", JSON.stringify(data));
}

function saveData(){
    let obj = {
        name: name.value,
        price: +price.value,
        cycle: cycle.value,
        date: date.value
    };

    if(editIndex==-1) data.push(obj);
    else data[editIndex] = obj;

    editIndex = -1;
    saveLocal();
    render();
}

function edit(i){
    let d = data[i];
    name.value = d.name;
    price.value = d.price;
    cycle.value = d.cycle;
    date.value = d.date;
    editIndex = i;
    new bootstrap.Modal(document.getElementById('modal')).show();
}

function del(i){
    data.splice(i,1);
    saveLocal();
    render();
}

function renew(i){
    let d = data[i];
    let newDate = new Date(d.date);
    newDate.setMonth(newDate.getMonth()+1);
    d.date = newDate.toISOString().split('T')[0];
    saveLocal();
    render();
}

function getStatus(date){
    return new Date(date) < new Date() ? "Expired" : "Active";
}

function render(){

let table="",alerts="";
let total=0,monthly=0,expired=0,upcoming=0,yearly=0;

let searchVal = search.value.toLowerCase();
let filterVal = filter.value;

data.forEach((d,i)=>{

if(!d.name.toLowerCase().includes(searchVal)) return;

let status = getStatus(d.date);

// filter logic
if(filterVal=="active" && status!="Active") return;
if(filterVal=="expired" && status!="Expired") return;
if(filterVal=="monthly" && d.cycle!="Monthly") return;
if(filterVal=="yearly" && d.cycle!="Yearly") return;

total++;

if(d.cycle=="Monthly") monthly+=d.price;
if(d.cycle=="Yearly") yearly+=d.price;

if(status=="Expired") expired++;
else upcoming++;

let diff = (new Date(d.date)-new Date())/(1000*60*60*24);

if(diff<3 && diff>0){
alerts += `<div class="alert alert-warning">⚠️ ${d.name} due in ${Math.floor(diff)} days</div>`;
}

table += `
<tr>
<td>${d.name}</td>
<td>₹${d.price}</td>
<td>${d.cycle}</td>
<td>${d.date}</td>
<td>${status}</td>
<td>
<button class="btn btn-sm btn-info" onclick="edit(${i})">✏️</button>
<button class="btn btn-sm btn-danger" onclick="del(${i})">🗑️</button>
<button class="btn btn-sm btn-success" onclick="renew(${i})">🔁</button>
</td>
</tr>`;
});

document.getElementById("table").innerHTML = table;
document.getElementById("alerts").innerHTML = alerts;

totalEl = document.getElementById("total").innerText = total;
document.getElementById("monthly").innerText = monthly;
document.getElementById("expired").innerText = expired;
document.getElementById("upcoming").innerText = upcoming;
document.getElementById("yearly").innerText = yearly;

renderCalendar();
}

function renderCalendar(){
let cal = document.getElementById("calendar");
cal.innerHTML="";

for(let i=1;i<=30;i++){
let div = document.createElement("div");
div.className="day";
div.innerText=i;

data.forEach(d=>{
let day = new Date(d.date).getDate();
if(day==i) div.classList.add("highlight");
});

cal.appendChild(div);
}
}

function toggleDark(){
document.body.classList.toggle("dark-mode");
}

render();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
