<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Subscriptions - SubRemind</title>

    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="substyle.css">
</head>

<body>

    <div class="sidebar">
        <div class="logo">🔔 SubRemind</div>
        <div class="subtitle">Smart Billing Reminders</div>

        <a href="firstpage.html"><i class='bx bxs-dashboard'></i> Dashboard</a>
        <a href="subscriptions.html"><i class='bx bx-credit-card'></i> Subscriptions</a>
        <a href="addnewsubscription.html"><i class='bx bx-plus'></i> Add New</a>
        <a href="reminders.html"><i class='bx bx-bell'></i> Reminders</a>
        <a href="settings.html"><i class='bx bx-cog'></i> Settings</a>

        <div style="position:absolute; bottom:20px;">
            <a><i class='bx bx-log-out'></i> Logout</a>
        </div>
    </div>

    <div class="main">

        <div class="glass header">
        <div>
            <h1>My Subscriptions</h1>
        </div>
        <div class="total">
            <h1 id="totalAmount">₹0</h1>
        </div>
    </div>

    <div class="glass top-bar">
        <div class="search">
            <i class='bx bx-search'></i>
            <input id="searchInput" placeholder="Search subscriptions...">
        </div>
    </div>

    <div class="grid" id="subscriptionsContainer"></div>

</div>

<script>

const user_id = localStorage.getItem("user_id");

// DATE FIX
function formatDate(dateString) {
    const date = new Date(dateString);
    return date.toLocaleDateString("en-IN", {
        day: "2-digit",
        month: "short",
        year: "numeric"
    });
}

// ✅ REUSABLE DISPLAY FUNCTION (FIXED)
function displaySubscriptions(data) {
    const container = document.getElementById("subscriptionsContainer");
    container.innerHTML = "";

    data.forEach(sub => {
        const card = document.createElement("div");
        card.className = "glass card";

        card.innerHTML = `
            <div class="card-top">
                <div class="logo-box blue">${sub.name.charAt(0)}</div>
                <div class="badge ${sub.status === 'active' ? 'active-badge' : 'paused-badge'}">
                    ${sub.status}
                </div>
            </div>

            <h2>${sub.name}</h2>

            <div class="price">₹${sub.amount}</div>

            <div class="billing">
                <p class="small">Last Billing</p>
                <b>${formatDate(sub.renewal_date)}</b>
            </div>

            <div class="actions">
                <div class="btn" onclick="toggleStatus(${sub.id}, '${sub.status}')">
                    ${sub.status === 'active' ? 'Pause' : 'Resume'}
                </div>

                <div class="icon-btn delete" onclick="deleteSub(${sub.id})">
                    🗑
                </div>
            </div>
        `;

        container.appendChild(card);
    });
}

// LOAD ALL
async function loadSubscriptions() {
    const res = await fetch(`http://localhost:5000/subscriptions/${user_id}`);
    const data = await res.json();
    displaySubscriptions(data);
}

// DELETE
async function deleteSub(id) {
    if (!confirm("Delete this subscription?")) return;

    await fetch(`http://localhost:5000/delete-subscription/${id}`, {
        method: "DELETE"
    });

    loadSubscriptions();
    loadTotal();
}

// TOGGLE STATUS
async function toggleStatus(id, currentStatus) {
    const newStatus = currentStatus === "active" ? "paused" : "active";

    await fetch(`http://localhost:5000/update-subscription/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status: newStatus })
    });

    loadSubscriptions();
}

// TOTAL
async function loadTotal() {
    const res = await fetch(`http://localhost:5000/total-spending/${user_id}`);
    const data = await res.json();
    document.getElementById("totalAmount").innerText =
        "₹" + (data.total_monthly_spending || 0);
}

// 🔍 SEARCH (WORKING)
const searchInput = document.getElementById("searchInput");

let timeout;
searchInput.addEventListener("input", () => {
    clearTimeout(timeout);

    timeout = setTimeout(async () => {
        const query = searchInput.value.trim();

        if (query === "") {
            loadSubscriptions();
            return;
        }

        const res = await fetch(
            `http://localhost:5000/search-subscriptions/${user_id}?q=${query}`
        );

        const data = await res.json();
        displaySubscriptions(data);

    }, 300);
});

// INIT
loadSubscriptions();
loadTotal();

</script>

</body>
</html>
