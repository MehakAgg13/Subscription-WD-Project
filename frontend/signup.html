<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia;

            background: url("../images/signup.jpg") center/cover;


            display: flex;
            justify-content: center;
            align-items: center;

        }

        .signup-box {
            width: 100%;
            max-width: 420px;
            background: rgba(77, 68, 68, 0.275);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            padding: 30px;
            color: white;
        }

        .form-control::placeholder {
            color: #8f8989;
        }

        .btn:hover {
            background-color: #d7d7d7;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="signup-box shadow">

        <h1 class="text-center mb-3">Create Account</h1>
        <p class="text-center text-light mb-4">
            Start managing your subscriptions today!
        </p>

        <form id="signupForm">

            <!-- Name -->
            <input type="text" id="nameField" class="form-control mb-3" placeholder="Enter Name" required>

            <!-- Email -->
            <input type="email" id="emailField" class="form-control mb-3" placeholder="Enter Email" required>

            <!-- Password -->
            <input type="password" id="passwordField" class="form-control mb-3" placeholder="Enter Password" required>

            <!-- Confirm Password -->
            <input type="password" id="confirmPasswordField" class="form-control mb-3" placeholder="Confirm Password"
                required>

            <!-- Show Password -->
            <div class="d-flex justify-content-between mb-3">
                <label>
                    <input type="checkbox" onclick="togglePassword()"> Show Password
                </label>
                <a href="login.html" class="text-white text-decoration-none">Back</a>
            </div>

            <!-- Button -->
            <button class="btn btn-light w-100 fw-bold" id="submitBtn">Sign Up</button>

        </form>

        <p class="text-center mt-3">
            Already have an account?
            <a href="login.html" class="text-white fw-bold">Login</a>
        </p>

    </div>

    <script>
        document.getElementById("signupForm").addEventListener("submit", function (e) {
            e.preventDefault();

            let name = document.getElementById("nameField").value;
            let email = document.getElementById("emailField").value;
            let password = document.getElementById("passwordField").value;
            let confirmPassword = document.getElementById("confirmPasswordField").value;

            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            // Save user in localStorage
            let user = {
                name: name,
                email: email,
                password: password
            };

            fetch("http://localhost:5000/signup", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    name: name,
                    email: email,
                    password: password
                })
            })
                .then(res => res.text())
                .then(data => {
                    alert(data);
                    window.location.href = "login.html";
                });
        });

        // Toggle password
        function togglePassword() {
            let p1 = document.getElementById("passwordField");
            let p2 = document.getElementById("confirmPasswordField");

            p1.type = p1.type === "password" ? "text" : "password";
            p2.type = p2.type === "password" ? "text" : "password";
        }
    </script>

</body>

</html>
