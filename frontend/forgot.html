<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      min-height: 100vh;
      font-family: Georgia, 'Times New Roman', Times, serif;
      background: url('../images/forgotbg.png') center/cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      width: 100%;
      max-width: 420px;
      background: rgba(92, 91, 91, 0.144);
      backdrop-filter: blur(15px);
      border-radius: 25px;
      padding: 40px;
      color: white;
    }

    .form-control::placeholder {
      color: #7a7575;
    }

    .input-box {
      position: relative;
    }

    .btn:hover {
      background-color: #d7d7d7;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="box shadow">

    <h1 class="text-center mb-3">Reset Password</h1>
    <p class="text-center text-light mb-4">
      Enter your email and set a new password
    </p>

    <form id="forgotForm">

      <!-- Email -->
      <input type="email" id="email" class="form-control mb-3" placeholder="Enter Email" required>

      <!-- New Password -->
      <input type="password" id="newPassword" class="form-control mb-3" placeholder="New Password" required>

      <!-- Confirm Password -->
      <input type="password" id="confirmPassword" class="form-control mb-3" placeholder="Confirm Password" required>

      <!-- Show Password -->
      <div class="d-flex justify-content-between mb-3">
        <label>
          <input type="checkbox" onclick="togglePassword()"> Show Password
        </label>
        <a href="login.html" class="text-white text-decoration-none">Back</a>
      </div>

      <!-- Button -->
      <button class="btn btn-light w-100 fw-bold">Reset Password</button>

    </form>

    <p class="text-center mt-3">
      Remembered your password?
      <a href="login.html" class="text-white fw-bold">Login</a>
    </p>

  </div>

  <script>
document.getElementById("forgotForm").addEventListener("submit", function (e) {
  e.preventDefault();

  let email = document.getElementById("email").value.trim();
  let newPassword = document.getElementById("newPassword").value.trim();
  let confirmPassword = document.getElementById("confirmPassword").value.trim();

  // ✅ check passwords match
  if (newPassword !== confirmPassword) {
    alert("Passwords do not match!");
    return;
  }

  fetch("http://localhost:5000/forgot-password", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email: email,
      newPassword: newPassword
    })
  })
  .then(res => res.text())
  .then(data => {
    alert(data);

    if (data === "Password updated successfully") {
      window.location.href = "login.html";
    }
  });
});

function togglePassword() {
  let p1 = document.getElementById("newPassword");
  let p2 = document.getElementById("confirmPassword");

  p1.type = p1.type === "password" ? "text" : "password";
  p2.type = p2.type === "password" ? "text" : "password";
}
</script>

</body>

</html>
