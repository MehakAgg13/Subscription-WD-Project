<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  font-family: Georgia;
  background: linear-gradient(to right, #d1f2f8, #7090b2);
}

.box {
  max-width: 500px;
  max-height: 900px;
  margin: auto;
  margin-top: 80px;
  padding: 25px;
  background: rgb(248, 250, 252);
  border-radius: 10px;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
   .form-control {
                color: #7a7a7a;
                font-size: 15px;
                border: 2px solid #a2bed6;
            }

            .form-control:focus::placeholder {
                color: #bbb;
            }

            .btn {
                background-color: #3773a8;
                color: white;
                border: none;
                border-radius: 8px;
                padding: 10px;
                font-size: 16px;
                transition: 0.3s;
            }

            .btn:hover {
                background-color: #3a5aa5;
                transform: scale(1.05);
            }
}
</style>
</head>

<body>

<div class="box">
  <h2 class="text-center mb-5 mt-4"> Reset Password </h2>
  <p class="text-center text-muted">Enter your email and set a new password</p>

  <form id="resetForm">

    <!-- Email -->
    <input type="email" id="email" class="form-control mb-3" placeholder="Enter Email" required>

    <!-- New Password -->
    <input type="password" id="newPassword" class="form-control mb-3" placeholder="New Password" required>

    <!-- Confirm Password -->
    <input type="password" id="confirmPassword" class="form-control mb-3" placeholder="Confirm Password" required>

    <!-- Show Password -->
    <div class="mb-3">
      <input type="checkbox" onclick="togglePassword()"> Show Password
    </div>

    <!-- Button -->
    <button class="btn btn-primary w-100">Reset Password</button>

  </form>

  <!-- Back to login -->
  <p class="text-center mt-3">
    Back to <a href="login.html">Login</a>
  </p>
</div>

<script>

document.getElementById("resetForm").addEventListener("submit", function(e){
  e.preventDefault();

  let email = document.getElementById("email").value;
  let newPass = document.getElementById("newPassword").value;
  let confirmPass = document.getElementById("confirmPassword").value;

  let user = JSON.parse(localStorage.getItem("user"));

  // Check if user exists
  if(!user || user.email !== email){
    alert("Email not found!");
    return;
  }

  // Check password match
  if(newPass !== confirmPass){
    alert("Passwords do not match!");
    return;
  }

  // Update password
  user.password = newPass;
  localStorage.setItem("user", JSON.stringify(user));

  alert("Password reset successful!");
  window.location.href = "login.html";
});

// Toggle password visibility
function togglePassword(){
  let p1 = document.getElementById("newPassword");
  let p2 = document.getElementById("confirmPassword");

  p1.type = p1.type === "password" ? "text" : "password";
  p2.type = p2.type === "password" ? "text" : "password";
}

</script>

</body>
</html>
