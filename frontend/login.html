<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>

    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;

            /* ✅ Background Image */
            background: url('background.jpg') no-repeat;
            background-size: cover;          /* full screen */
            background-position: center ; 
            background-attachment: fixed;

            display: flex;
            justify-content: center;
            align-items: center;

            position: relative;
        }

        /* ✅ Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;

            width: 350px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            padding: 30px 25px;
            color: #fff;
        }

        .wrapper h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .input-box {
            position: relative;
            width: 100%;
            height: 45px;
            margin: 20px 0;
        }

        .input-box input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 25px;
            outline: none;
            padding: 0 45px 0 15px;
            color: #fff;
            font-size: 15px;
        }

        .input-box input::placeholder {
            color: #ddd;
        }

        .input-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin: 10px 0 20px;
        }

        .remember-forgot a {
            color: #fff;
            text-decoration: none;
        }

        .remember-forgot a:hover {
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            height: 45px;
            background: #fff;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            color: #333;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ddd;
        }

        .register-link {
            text-align: center;
            margin-top: 15px;
        }

        .register-link a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="wrapper">
    <form>
        <h1>Login</h1>

        <div class="input-box">
            <input type="text" placeholder="Username" required>
            <i class='bx bx-user'></i>
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password" required>
            <i class='bx bx-lock-alt'></i>
        </div>

        <div class="remember-forgot">
            <label><input type="checkbox"> Remember me</label>
            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit" class="btn">Login</button>

        <div class="register-link">
            <p>Don't have an account? <a href="#">Register</a></p>
        </div>
    </form>
</div>

</body>
</html>
