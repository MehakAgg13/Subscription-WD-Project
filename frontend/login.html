<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Georgia;
        }

        /* LEFT SIDE IMAGE */
        .left-side {
            background: url("../images/loginimg.png") center/cover no-repeat;
            position: relative;
            color: white;
        }

        .login-box {
            max-width: 90%;
            padding: 45px;
            background: rgb(248, 250, 252);
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .form-control {
            color: #7a7a7a;
            font-size: 15px;
            border: 2px solid #a2bed6;
        }

        .form-control:focus::placeholder {
            color: #bbb;
        }

        .btn {
            background-color: #3773a8;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #3a5aa5;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row vh-100">

            <!-- 🔹 LEFT SIDE -->
            <div class="col-md-6 d-none d-md-flex align-items-center justify-content-center left-side">

            </div>

            <!-- 🔹 RIGHT SIDE (YOUR LOGIN UI) -->
            <div class="col-md-6 d-flex align-items-center justify-content-center"
                style="background: linear-gradient(to right, #d1f2f8, #7090b2);">

                <div class="login-box">
                    <h1 class="text-center mb-3 mt-2"> Login </h1>
                    <p class="text-center text-muted">Login to continue</p>

                    <form>
                        <!-- Email -->
                        <input type="email" id="emailField" class="form-control mb-4" placeholder="Enter Email">

                        <!-- Password -->
                        <input type="password" id="passwordField" class="form-control mb-2"
                            placeholder="Enter Password">

                        <div class="mb-3">
                            <input type="checkbox" onclick="togglePassword()"> Show Password
                        </div>

                        <a href="forgot.html" class="small">Forgot Password?</a>

                        <!-- Button -->
                        <button class="btn w-100 mt-3" id="submitBtn"> Login </button>
                    </form>

                    <p class="text-center mt-3">
                        Don't have an account? Click here to
                        <a href="signup.html">Sign Up</a>
                    </p>
                </div>

            </div>

        </div>
    </div>

    <script>
        document.getElementById("submitBtn").addEventListener("click", function (e) {
            e.preventDefault();

            let email = document.getElementById("emailField").value;
            let password = document.getElementById("passwordField").value;

            let user = JSON.parse(localStorage.getItem("user"));

            if (user && user.email === email && user.password === password) {
                alert("Login Successful!");
                window.location.href = "index.html";
            } else {
                alert("Invalid credentials!");
            }
        });

        function togglePassword() {
            let passwordInput = document.getElementById("passwordField");

            passwordInput.type =
                passwordInput.type === "password" ? "text" : "password";
        }
    </script>

</body>

</html>
