<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title> 
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        body {
            font-family: Georgia;
            min-height: 100vh;
            background: url('../images/loginbg.jpg') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            background: rgba(193, 73, 73, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 50px;
            color: white;
        }

        .input-box {
            position: relative;
        }

        .input-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
        }

        .btn:hover {
            background-color: #d7d7d7;
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <div class="login-box shadow">
        <h1 class="text-center mb-4">Login</h1>
        <form> <!-- Email -->
            <div class="input-box mb-3"> <input type="email" id="emailField" class="form-control" placeholder="Email"
                    required> <i class='bx bx-user'></i> </div> <!-- Password -->
            <div class="input-box mb-3"> <input type="password" id="passwordField" class="form-control"
                    placeholder="Password" required> <i class='bx bx-lock-alt'></i> </div> <!-- Options -->
            <div class="d-flex justify-content-between mb-3"> <label> <input type="checkbox" onclick="togglePassword()">
                    Show Password </label> <a href="forgot.html" class="text-white text-decoration-none">Forgot?</a>
            </div> <!-- Button --> <button class="btn btn-light w-100 fw-bold" id="submitBtn">Login</button>
        </form>
        <p class="text-center mt-3"> Don't have an account? <a href="signup.html"
                class="text-white fw-bold">Register</a> </p>
    </div>
    <script>
        document.getElementById("submitBtn").addEventListener("click", function (e) {

            e.preventDefault();
            let email = document.getElementById("emailField").value;
            let password = document.getElementById("passwordField").value;
            let user = JSON.parse(localStorage.getItem("user"));

            if (user && user.email === email && user.password === password) {

                alert("Login Successful!"); window.location.href = "index.html";
            }
            else {
                alert("Invalid credentials!");
            }
        });

        function togglePassword() {
            let input = document.getElementById("passwordField"); input.type = input.type === "password" ? "text" : "password";
        }
    </script>
</body>

</html>
