<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Reminders - SubRemind</title>

    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* KEEPING YOUR CSS EXACTLY SAME */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: url('../images/loginbg.jpg') no-repeat center;
            background-size: cover;
            background-attachment: fixed;
        }

        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 0;
        }

        .sidebar {
            position: fixed;
            width: 240px;
            height: 100vh;
            padding: 25px;
            background: rgba(255, 255, 255, 0.1);
            border-right: 2px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            color: #fff;
            z-index: 10;
        }

        .logo {
            font-size: 22px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 13px;
            margin-bottom: 30px;
            color: #ddd;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            border-radius: 25px;
            text-decoration: none;
            color: #fff;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .active {
            background: rgba(255, 255, 255, 0.25);
        }

        .main {
            margin-left: 260px;
            padding: 40px;
            color: #fff;
            position: relative;
            z-index: 1;
        }

        .glass {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mark-btn {
            background: #fff;
            color: #000;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stat i {
            font-size: 20px;
            padding: 10px;
            border-radius: 10px;
            width: fit-content;
        }

        .red {
            background: #ef444433;
            color: #ef4444;
        }

        .yellow {
            background: #facc1533;
            color: #facc15;
        }

        .blue {
            background: #3b82f633;
            color: #3b82f6;
        }

        .tabs {
            display: flex;
            gap: 10px;
        }

        .tab {
            padding: 10px 18px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            cursor: pointer;
        }

        .tab.active {
            background: #fff;
            color: #000;
        }

        .card {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .left {
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }

        .icon {
            background: #ef444433;
            color: #ef4444;
            padding: 12px;
            border-radius: 10px;
        }

        .actions {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
        }

        .read {
            background: #fff;
            color: #000;
        }

        .dismiss {
            background: #ef4444;
            color: #fff;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge.medium {
            background: rgba(250, 204, 21, 0.2);
            color: #facc15;
        }

        .badge.low {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #3b82f6;
            border-radius: 50%;
        }

        .meta {
            font-size: 13px;
            color: #ddd;
            margin-top: 5px;
        }

        .right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">🔔 SubRemind</div>
        <div class="subtitle">Smart Billing Reminders</div>

        <a href="firstpage.html"><i class='bx bxs-dashboard'></i> Dashboard</a>
        <a href="subscriptions.html"><i class='bx bx-credit-card'></i> Subscriptions</a>
        <a href="addnewsubscription.html"><i class='bx bx-plus'></i> Add New</a>
        <a href="reminders.html"><i class='bx bx-bell'></i> Reminders</a>
        <a href="settings.html"><i class='bx bx-cog'></i> Settings</a>

        <div style="position:absolute; bottom:20px;">
            <a href="index.html"><i class='bx bx-log-out'></i> Logout</a>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- HEADER -->
        <div class="glass header">
            <div>
                <h1><i class='bx bx-bell'></i> Reminders</h1>
                <p>Stay on top of your subscription payments</p>
            </div>
            <div class="mark-btn" onclick="markAllRead()">Mark All as Read</div>
        </div>

        <!-- STATS -->
        <div class="stats"></div>

        <!-- TABS -->
        <div class="glass">
            <div class="tabs">
                <div class="tab active" data-filter="all">All Reminders</div>
                <div class="tab" data-filter="unread">Unread (0)</div>
                <div class="tab" data-filter="upcoming">Upcoming</div>
                <div class="tab" data-filter="overdue">Overdue (0)</div>
            </div>
        </div>

    </div>

    <script>
        function setupTabs() {
            const tabs = document.querySelectorAll(".tab");
            const cards = document.querySelectorAll(".card");

            tabs.forEach(tab => {
                tab.onclick = () => {
                    tabs.forEach(t => t.classList.remove("active"));
                    tab.classList.add("active");

                    const filter = tab.dataset.filter;

                    cards.forEach(card => {
                        const type = card.dataset.type;
                        card.style.display =
                            filter === "all" || type.includes(filter) ? "flex" : "none";
                    });
                };
            });
        }

        async function loadReminders() {
            const userId = localStorage.getItem("user_id");

            const res = await fetch(`http://localhost:5000/all-reminders/${userId}`);
            const data = await res.json();

            let overdue = 0, upcoming = 0, unread = 0;
            let html = "";

            data.forEach(item => {

                let text = "", badge = "medium", icon = "bx-time-five";

                if (item.days_left <= 0) {
                    text = item.days_left === 0 ? "Payment due today!" : "Payment overdue!";
                    badge = "high";
                    icon = "bx-error";
                    overdue++;
                } else {
                    text = `Payment due in ${item.days_left} days`;
                    upcoming++;
                }

                if (!item.read_status) unread++;

                // ✅ FIX DATE HERE
                const formattedDate = item.next_payment_date.split("T")[0];

                html += `
    <div class="glass card" data-type="${item.type} ${item.read_status ? 'read' : 'unread'}">
        <div class="left">
            <div class="icon"><i class='bx ${icon}'></i></div>
            <div>
                <h2>${item.name}</h2>
                <p>${text}</p>
                
                <p class="meta">${formattedDate} &nbsp;&nbsp; ₹${item.amount}</p>

                <div class="actions">
                    ${!item.read_status ? `<div class="btn read" onclick="markRead(${item.id})">Mark as Read</div>` : ""}
                    <div class="btn dismiss" onclick="dismiss(${item.subscription_id})">Dismiss</div>
                </div>
            </div>
        </div>

        <div class="right">
            <span class="badge ${badge}">${badge}</span>
            ${!item.read_status ? `<span class="dot"></span>` : ""}
        </div>
    </div>`;
            });

            document.querySelector(".main").innerHTML += html;

            document.querySelector(".stats").innerHTML = `
        <div class="glass stat"><i class='bx bx-error red'></i><p>Overdue</p><h2>${overdue}</h2></div>
        <div class="glass stat"><i class='bx bx-time yellow'></i><p>Upcoming</p><h2>${upcoming}</h2></div>
        <div class="glass stat"><i class='bx bx-bell blue'></i><p>Unread</p><h2>${unread}</h2></div>
    `;

            document.querySelector('[data-filter="unread"]').innerText = `Unread (${unread})`;
            document.querySelector('[data-filter="overdue"]').innerText = `Overdue (${overdue})`;

            setupTabs();
        }

        async function markRead(id) {
            await fetch(`http://localhost:5000/mark-read/${id}`, { method: "PUT" });
            location.reload();
        }

        async function dismiss(id) {
            console.log("Sending ID:", id);   // 👈 check this

            const confirmAction = confirm("Are you sure you want to dismiss this reminder?");
            if (!confirmAction) return;

            const res = await fetch(`http://localhost:5000/dismiss-reminder/${id}`, {
                method: "DELETE"
            });

            const msg = await res.text();
            alert(msg);

            location.reload();
        }

        async function markAllRead() {
            const userId = localStorage.getItem("user_id");

            const confirmAction = confirm("Mark all reminders as read?");
            if (!confirmAction) return;

            const res = await fetch(`http://localhost:5000/mark-all-read/${userId}`, {
                method: "PUT"
            });

            const msg = await res.text();
            alert(msg);

            location.reload();
        }

        loadReminders();
    </script>

</body>

</html>
